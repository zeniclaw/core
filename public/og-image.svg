<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e17"/>
      <stop offset="100%" style="stop-color:#111827"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6"/>
      <stop offset="50%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <radialGradient id="glow1" cx="30%" cy="30%" r="50%">
      <stop offset="0%" style="stop-color:rgba(59,130,246,0.15)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
    <radialGradient id="glow2" cx="70%" cy="70%" r="50%">
      <stop offset="0%" style="stop-color:rgba(139,92,246,0.1)"/>
      <stop offset="100%" style="stop-color:transparent"/>
    </radialGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>
  <rect x="0" y="0" width="1200" height="4" fill="url(#accent)"/>
  <!-- Logo -->
  <rect x="80" y="80" width="64" height="64" rx="14" fill="url(#accent)"/>
  <text x="112" y="125" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="white" text-anchor="middle">Z</text>
  <text x="160" y="122" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" fill="#f1f5f9">ZeniClaw</text>
  <!-- Title -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="#f1f5f9">Your AI Army,</text>
  <text x="80" y="330" font-family="system-ui, -apple-system, sans-serif" font-size="56" font-weight="800" fill="url(#accent)">One WhatsApp Away</text>
  <!-- Description -->
  <text x="80" y="400" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">Self-hosted AI platform with 19 specialized agents.</text>
  <text x="80" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="22" fill="#94a3b8">Manage everything from a single WhatsApp chat.</text>
  <!-- Stats -->
  <text x="80" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#3b82f6">19 Agents</text>
  <text x="230" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b">|</text>
  <text x="260" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#8b5cf6">Open Source</text>
  <text x="430" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" fill="#64748b">|</text>
  <text x="460" y="530" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="600" fill="#ec4899">100% Self-Hosted</text>
  <!-- Agent icons on the right -->
  <text x="850" y="200" font-size="48" fill="white" opacity="0.15">&#x1F916;</text>
  <text x="950" y="180" font-size="48" fill="white" opacity="0.12">&#x1F4AC;</text>
  <text x="1050" y="220" font-size="48" fill="white" opacity="0.1">&#x1F4BB;</text>
  <text x="880" y="310" font-size="48" fill="white" opacity="0.13">&#x1F9E0;</text>
  <text x="1000" y="290" font-size="48" fill="white" opacity="0.11">&#x23F0;</text>
  <text x="1080" y="340" font-size="48" fill="white" opacity="0.09">&#x1F4B0;</text>
  <text x="830" y="420" font-size="48" fill="white" opacity="0.12">&#x1F3B5;</text>
  <text x="960" y="400" font-size="48" fill="white" opacity="0.1">&#x1F4CA;</text>
  <text x="1070" y="450" font-size="48" fill="white" opacity="0.08">&#x1F512;</text>
  <!-- URL bottom right -->
  <text x="1120" y="580" font-family="monospace" font-size="16" fill="#64748b" text-anchor="end">zeniclaw.com</text>
</svg>
