# Public AI Chat — served on a dedicated port (default 8888)
# Only exposes /chat and /api/public-chat endpoints
server {
    listen 8888;
    server_name _;
    root /var/www/html/public;
    index index.php;

    client_max_body_size 10M;

    add_header X-Frame-Options "ALLOWALL";
    add_header X-Content-Type-Options "nosniff";

    charset utf-8;

    # Only allow the public chat page and API
    location = / {
        rewrite ^ /chat permanent;
    }

    location = /chat {
        try_files $uri /index.php?$query_string;
    }

    location = /api/public-chat {
        try_files $uri /index.php?$query_string;
    }

    # Vite-compiled assets needed by the chat page
    location /build/ {
        try_files $uri =404;
    }

    location = /favicon.ico { access_log off; log_not_found off; }

    location ~ \.php$ {
        fastcgi_pass 127.0.0.1:9000;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        include fastcgi_params;
        fastcgi_read_timeout 300;
    }

    # Deny everything else
    location / {
        return 404;
    }
}
