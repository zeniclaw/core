version: '3.9'

services:

  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        HTTP_PROXY: ${HTTP_PROXY:-}
        HTTPS_PROXY: ${HTTPS_PROXY:-}
        NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,redis,waha,ollama,app}
    container_name: zeniclaw_app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-8080}:80"
      - "${CHAT_PORT:-8888}:8888"
    environment:
      APP_ENV: production
      APP_KEY: ${APP_KEY}
      APP_URL: ${APP_URL:-http://localhost:8080}
      DB_CONNECTION: pgsql
      DB_HOST: db
      DB_PORT: 5432
      DB_DATABASE: ${DB_DATABASE:-zeniclaw}
      DB_USERNAME: ${DB_USERNAME:-zeniclaw}
      DB_PASSWORD: ${DB_PASSWORD:-secret}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CACHE_DRIVER: redis
      SESSION_DRIVER: redis
      QUEUE_CONNECTION: redis
      CHAT_API_KEY: ${CHAT_API_KEY:-}
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,redis,waha,ollama,app}
    volumes:
      - app_storage:/var/www/html/storage
      - ${CONTAINER_SOCKET:-/var/run/docker.sock}:/var/run/docker.sock
      - .:/opt/zeniclaw-repo
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - zeniclaw

  db:
    image: postgres:16-alpine
    container_name: zeniclaw_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_DATABASE:-zeniclaw}
      POSTGRES_USER: ${DB_USERNAME:-zeniclaw}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-secret}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USERNAME:-zeniclaw}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - zeniclaw

  redis:
    image: redis:7-alpine
    container_name: zeniclaw_redis
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10
    networks:
      - zeniclaw

  ollama:
    image: ollama/ollama:latest
    container_name: zeniclaw_ollama
    restart: unless-stopped
    profiles:
      - ollama
    environment:
      HTTP_PROXY: ${HTTP_PROXY:-}
      HTTPS_PROXY: ${HTTPS_PROXY:-}
      NO_PROXY: ${NO_PROXY:-localhost,127.0.0.1,db,redis,waha,ollama,app}
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/11434' || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - zeniclaw

  waha:
    build:
      context: ./whatsapp-gateway
      dockerfile: Dockerfile
    container_name: zeniclaw_waha
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - waha_data:/data
    environment:
      - WEBHOOK_URL=http://app:80/webhook/whatsapp/1
      - API_KEY=zeniclaw-waha-2026
      - PORT=3000
      - LOG_LEVEL=info
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3000/api/health').then(r=>r.ok?process.exit(0):process.exit(1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - zeniclaw

volumes:
  db_data:
  redis_data:
  app_storage:
  waha_data:
  ollama_data:

networks:
  zeniclaw:
    driver: bridge
